<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>FaR-RMS · Rhabdomyosarcome — Logigramme RT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
:root{--bg:#f5f0e8;--surface:#ede8dc;--border:#c8bfaa;--text:#1a1208;--text2:#5a4f3a;--text3:#9a8f7a;--lr:#2d7a3a;--sr:#1a5fa8;--hr:#c0392b;--vhr:#a0720a;--rl:#6b3fa0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{height:100vh;overflow:hidden;display:flex;flex-direction:column;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
header{flex-shrink:0;z-index:10;background:rgba(245,240,232,0.97);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;gap:12px;}
.hdr-logo{width:34px;height:34px;border:1.5px solid var(--vhr);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--vhr);font-weight:500;flex-shrink:0;}
.hdr-title{font-family:'DM Serif Display',serif;font-size:15px;color:var(--text);}
.hdr-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);margin-top:1px;}
.hdr-badge{font-family:'DM Mono',monospace;font-size:9px;padding:3px 10px;border-radius:20px;background:rgba(160,114,10,0.1);border:1px solid rgba(160,114,10,0.3);color:var(--vhr);margin-left:auto;flex-shrink:0;}
.btn-reset-zoom{font-family:'DM Mono',monospace;font-size:10px;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;transition:all 0.2s;}
.btn-reset-zoom:hover{border-color:var(--sr);color:var(--sr);}
.legend{flex-shrink:0;padding:7px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:16px;overflow-x:auto;}
.legend-item{display:flex;align-items:center;gap:6px;white-space:nowrap;}
.swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0;}
.swatch.decision{border-radius:50%;}
.legend-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);}
.legend-help{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);margin-left:auto;}
#chart{flex:1;overflow:hidden;cursor:grab;}
#chart:active{cursor:grabbing;}

/* TOOLTIP */
.tooltip{position:fixed;pointer-events:none;z-index:100;background:rgba(20,14,5,0.96);border-radius:10px;padding:16px 18px;width:320px;box-shadow:0 6px 32px rgba(0,0,0,0.3);border:1px solid rgba(200,191,170,0.2);display:none;}
.tt-title{font-family:'DM Mono',monospace;font-size:9px;color:#9a8f7a;margin-bottom:8px;letter-spacing:1.5px;text-transform:uppercase;}
.tt-q{font-size:13px;font-weight:500;color:#e6edf3;margin-bottom:12px;line-height:1.4;}
.tt-section{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(200,191,170,0.15);}
.tt-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.tt-section-lbl{font-family:'DM Mono',monospace;font-size:9px;color:#9a8f7a;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.tt-row{display:flex;gap:8px;margin-bottom:4px;font-size:11px;}
.tt-label{color:#9a8f7a;min-width:66px;flex-shrink:0;}
.tt-val{color:#c9d1d9;line-height:1.4;}
.tt-dose{font-family:'DM Mono',monospace;font-size:12px;color:#388bfd;font-weight:500;}
.tt-dose.esc{color:#d29922;}
.tt-dose.highesc{color:#f85149;}
.tt-efs{font-family:'DM Mono',monospace;font-size:11px;}
.efs-good{color:#3fb950;}.efs-mid{color:#d29922;}.efs-bad{color:#f85149;}
</style>
</head>
<body>
<header>
  <div class="hdr-logo">FR</div>
  <div>
    <div class="hdr-title">FaR-RMS — Algorithme · Stratification & Radiothérapie</div>
    <div class="hdr-sub">FaR-RMS v2.0c · Survoler pour timing / volumes / doses RT · Scroll pour zoomer</div>
  </div>
  <button class="btn-reset-zoom" id="btnReset">⊙ Recentrer</button>
  <span class="hdr-badge">FaR-RMS · EpSSG</span>
</header>

<div class="legend">
  <div class="legend-item"><div class="swatch decision" style="background:#dce8f5;border:1.5px solid #1a5fa8"></div><span class="legend-label">Décision</span></div>
  <div class="legend-item"><div class="swatch" style="background:#d5edd8;border:1.5px solid #2d7a3a"></div><span class="legend-label">LR — Pas de RT</span></div>
  <div class="legend-item"><div class="swatch" style="background:#d5e4f5;border:1.5px solid #1a5fa8"></div><span class="legend-label">SR — RT conditionnelle</span></div>
  <div class="legend-item"><div class="swatch" style="background:#f5d8d5;border:1.5px solid #c0392b"></div><span class="legend-label">HR — RT indiquée</span></div>
  <div class="legend-item"><div class="swatch" style="background:#f5ead5;border:1.5px solid #a0720a"></div><span class="legend-label">VHR — RT + RT2 méta</span></div>
  <div class="legend-item"><div class="swatch" style="background:#ece0f5;border:1.5px solid #6b3fa0"></div><span class="legend-label">Rechute CT3</span></div>
  <span class="legend-help">Survoler pour détails RT</span>
</div>

<div id="chart"></div>

<div class="tooltip" id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-q" id="tt-q"></div>
  <div id="tt-body"></div>
</div>

<script>
const NS = {
  decision:       {fill:'#dce8f5',stroke:'#1a5fa8',text:'#0a1020'},
  result_lr:      {fill:'#d5edd8',stroke:'#2d7a3a',text:'#0a1a0a'},
  result_sr:      {fill:'#d5e4f5',stroke:'#1a5fa8',text:'#0a1020'},
  result_hr:      {fill:'#f5d8d5',stroke:'#c0392b',text:'#200505'},
  result_vhr:     {fill:'#f5ead5',stroke:'#a0720a',text:'#201000'},
  result_relapse: {fill:'#ece0f5',stroke:'#6b3fa0',text:'#100020'},
};
const NW=136, NH=46;

// ═══ TREE DATA ═══
const TREE = {
  id:'root',label:'RMS confirmé\n(non pléomorphe)',type:'decision',
  detail:{title:'ENTRÉE PROTOCOL',q:'RMS histologiquement confirmé. Exclure pléomorphe.',
    timing:'Statut fusion PAX-FOXO1 à obtenir avant entrée.',
    chemo:'Voir sous-groupes A–H selon stratification.',
    rt_ind:'Selon sous-groupe (voir branches)',
    efs:'EFS variable selon sous-groupe'},
  children:[
    { id:'fn',label:'Fusion–\n(PAX-FOXO1–)',type:'decision',edgeLabel:'Fusion–',
      detail:{title:'FUSION–',q:'Non-alvéolaire ou PAX-FOXO1 non détecté.',timing:'→ Évaluer IRS, N, site, taille/âge.',rt_ind:'RT selon IRS et site',efs:'EFS 3 ans : 55–95 % selon sous-groupe'},
      children:[
        { id:'fn_i',label:'IRS I — R0\n(Fusion–)',type:'decision',edgeLabel:'IRS I',
          detail:{title:'FUSION– · IRS I',q:'Résection R0 complète.',timing:'Évaluer taille et âge.',rt_ind:'RT non systématique',efs:'Dépend taille/âge'},
          children:[
            { id:'sgA',label:'Sous-groupe A\nBas Risque (LR)',type:'result_lr',edgeLabel:'Taille ≤5cm\nÂge 1–10 ans',
              detail:{title:'SOUS-GROUPE A — LR',q:'Fusion–, IRS I, N0, taille ≤5 cm, âge 1–10 ans, site favorable.',
                timing:'RT non indiquée. Décision après C3 si doute sur résidu.',
                rt_ind:'PAS DE RT — IRS I R0 Fusion–.',
                doses:'Aucune dose RT.',
                volumes:'Pas de délinéation.',
                chemo:'IVA × 4 cycles.',
                efs:'EFS 3 ans : ~95 % · OS 5 ans : > 90 %'} },
            { id:'sgB',label:'Sous-groupe B\nRisque Standard (SR)',type:'result_sr',edgeLabel:'Taille >5cm\nou âge hors 1–10 ans',
              detail:{title:'SOUS-GROUPE B — SR',q:'Fusion–, IRS I, N0 — taille > 5 cm OU âge < 1 an ou ≥ 10 ans.',
                timing:'RT si IRS II/III uniquement. RT préop → après C4 (sem. 13). RT postop → dès C post-op 2.',
                rt_ind:'RT conditionnelle (si IRS II marge+). RT1A (pré-op vs post-op). RT1B si HLFR (site défav. ou ≥18 ans).',
                doses:'SLFR : 41.4 Gy / 23 fr. HLFR escaladé (RT1B) : 50.4 Gy / 28 fr (Ph1 41.4 Gy + Ph2 +9 Gy).',
                volumes:'GTVp_pre → CTVp_pre +1 cm. GTVp_post → CTVp_post +0,5 cm (boost). PTV = CTV +3–10 mm.',
                chemo:'IVA × 9 cycles.',
                efs:'EFS 3 ans : ~77 % · OS 5 ans : ~85 %'} }
          ]},
        { id:'fn_ii',label:'IRS II–III\n(Fusion–)',type:'decision',edgeLabel:'IRS II–III',
          detail:{title:'FUSION– · IRS II–III',q:'Résidu macroscopique ou marges microscopiques +.',timing:'Évaluer N puis site.',rt_ind:'RT indiquée pour la majorité',efs:'Dépend site et N'},
          children:[
            { id:'fn_n0',label:'N0 — Site ?',type:'decision',edgeLabel:'N0',
              detail:{title:'FUSION– · N0',q:'Pas d\'envahissement ganglionnaire. Évaluer site primitif.',timing:'Décision RT après C3.',rt_ind:'RT sur site primitif si site défavorable',efs:'Dépend site'},
              children:[
                { id:'sgC',label:'Sous-groupe C\nRisque Standard (SR)',type:'result_sr',edgeLabel:'Site Favorable',
                  detail:{title:'SOUS-GROUPE C — SR',q:'Fusion–, IRS II–III, N0, site favorable.',
                    timing:'Décision après C3. RT préop → C4 sem.13. RT postop → C post-op 2.',
                    rt_ind:'RT systématique (sauf R0 secondaire paratesticulaire/utérus). RT1A, RT1B/RT1C si HLFR.',
                    doses:'Standard : 41.4 Gy / 23 fr (SLFR ou RC non résécable). HLFR RT1B escaladé : 50.4 Gy (41.4+9 Gy). RT1C escaladé : 59.4 Gy (41.4+18 Gy).',
                    volumes:'GTVp_pre → CTVp_pre +1 cm. GTVp_post → CTVp_post +0,5 cm (boost). CTV → PTV +3–10 mm.',
                    chemo:'IVA × 9 cycles.',
                    efs:'EFS 3 ans : ~77 % · OS 5 ans : ~85 %'} },
                { id:'sgD',label:'Sous-groupe D\nHaut Risque (HR)',type:'result_hr',edgeLabel:'Site Défavorable',
                  detail:{title:'SOUS-GROUPE D — HR',q:'Fusion–, IRS II–III, N0, site défavorable.',
                    timing:'Décision après C3. RT préop → C4 sem.13. RT postop → C post-op 2.',
                    rt_ind:'RT indiquée. Site défav. = HLFR automatique. RT1A, RT1B, RT1C selon résécabilité.',
                    doses:'SLFR R0/R1 ou RC non résécable : 41.4 Gy / 23 fr. HLFR résécable RT1B escaladé : 50.4 Gy (41.4+9 Gy). HLFR non résécable RT1C std : 50.4 Gy. RT1C escaladé : 59.4 Gy (41.4+18 Gy).',
                    volumes:'GTVp_pre → CTVp_pre +1 cm (+2 cm sup/inf si extrémité). GTVp_post → CTVp_post +0,5 cm. CTV → PTV +3–10 mm.',
                    chemo:'IVA × 9 (CT1B) ou IRIVA × 9 (CT1B randomisation). Maintenance VnC × 6 → CT2B.',
                    efs:'EFS 3 ans : ~65 % · OS 5 ans : ~70 %'} }
              ]},
            { id:'sgE',label:'Sous-groupe E\nHaut Risque (HR)',type:'result_hr',edgeLabel:'N1',
              detail:{title:'SOUS-GROUPE E — HR',q:'Fusion–, IRS II–III, N1 (≥ 1 ganglion).',
                timing:'Décision après C3. RT préop → C4. RT postop → C post-op 2. RT ganglionnaire simultanée au primitif.',
                rt_ind:'RT primitif + RT ganglionnaire N1 systématique (indépendante de la chirurgie ganglionnaire). RT1A/RT1B/RT1C selon primitif.',
                doses:'Primitif std : 41.4 Gy / 23 fr. HLFR RT1B escaladé : 50.4 Gy (41.4+9 Gy). RT1C escaladé : 59.4 Gy (41.4+18 Gy). Ganglions N1 : 41.4 Gy / 23 fr sur CTVn. Boost ganglionnaire bulky résiduel : +9 Gy / 5 fr sur CTVn_post.',
                volumes:'Primitif : GTVp_pre → CTVp_pre +1 cm. Ganglions : GTVn → CTVn +3 cm sup/inf (direction drainage), circumférentiel. GTVn_post → CTVn_post +0,5 cm si bulky résiduel.',
                chemo:'IVA × 9 (CT1B) ou IRIVA × 9. Maintenance VnC × 6 → CT2B.',
                efs:'EFS 3 ans : ~55 % · OS 5 ans : ~60 %'} }
          ]}
      ]},
    { id:'fp',label:'Fusion+\n(PAX-FOXO1+)',type:'decision',edgeLabel:'Fusion+',
      detail:{title:'FUSION+',q:'Alvéolaire ou PAX3/PAX7-FOXO1 détecté. Pronostic défavorable.',timing:'→ Évaluer N.',rt_ind:'RT systématique sur site primitif',efs:'EFS 3 ans : 35–65 % selon N et stade'},
      children:[
        { id:'sgF',label:'Sous-groupe F\nHaut Risque (HR)',type:'result_hr',edgeLabel:'N0',
          detail:{title:'SOUS-GROUPE F — HR',q:'Fusion+, IRS I–III, N0.',
            timing:'Décision après C3. RT préop → C4 sem.13. RT postop → C post-op 2.',
            rt_ind:'RT indiquée sur site primitif. Site défav. = HLFR. RT1A, RT1B, RT1C.',
            doses:'SLFR/RC non résécable : 41.4 Gy / 23 fr. HLFR résécable RT1B escaladé : 50.4 Gy (41.4+9 Gy). HLFR non résécable RT1C std : 50.4 Gy. RT1C escaladé : 59.4 Gy (41.4+18 Gy).',
            volumes:'GTVp_pre → CTVp_pre +1 cm. GTVp_post → CTVp_post +0,5 cm. CTV → PTV +3–10 mm.',
            chemo:'IVA × 9 (CT1B) ou IRIVA × 9. Maintenance VnC × 6 → CT2B.',
            efs:'EFS 3 ans : ~55–65 % · OS 5 ans : ~60–70 %'} },
        { id:'sgG',label:'Sous-groupe G\nTrès Haut Risque (VHR)',type:'result_vhr',edgeLabel:'N1 + IRS II–III',
          detail:{title:'SOUS-GROUPE G — VHR',q:'Fusion+, IRS II–III, N1. Très haut risque.',
            timing:'Décision après C3 (localisé) ou C6 (méta). RT préop → C4 ou C7.',
            rt_ind:'RT primitif + RT ganglionnaire N1. RT1A/RT1B/RT1C. Ganglions : RT obligatoire quelle que soit la chirurgie ganglionnaire.',
            doses:'Primitif std : 41.4 Gy / 23 fr. HLFR RT1B escaladé : 50.4 Gy (41.4+9 Gy). RT1C escaladé : 59.4 Gy (41.4+18 Gy). Ganglions : 41.4 Gy / 23 fr sur CTVn. Boost bulky résiduel : +9 Gy / 5 fr sur CTVn_post.',
            volumes:'Primitif : GTVp_pre → CTVp_pre +1 cm. Ganglions : GTVn → CTVn +3 cm sup/inf. GTVn_post → CTVn_post +0,5 cm si bulky.',
            chemo:'IVADo × 9 (CT1A) ou IRIVA × 9. Maintenance VnC × 12 → CT2A.',
            efs:'EFS 3 ans : ~35–45 % · OS 5 ans : ~43–50 %'} }
      ]},
    { id:'sgH',label:'Sous-groupe H\nTrès Haut Risque (VHR)',type:'result_vhr',edgeLabel:'IRS IV\n(Métastatique)',
      detail:{title:'SOUS-GROUPE H — VHR MÉTASTATIQUE',q:'IRS IV — Maladie métastatique. Tout statut fusion.',
        timing:'RT primitif : décision après C6 (sem.22). RT préop → C7. RT postop → C post-op 2. RT2 randomisation : après C6, avant C9.',
        rt_ind:'RT primitif + RT ganglionnaire si N1. Randomisation RT2 si score Oberlin ≥ 2 (métastases).',
        doses:'Primitif std : 41.4 Gy / 23 fr. HLFR RT1B esc. : 50.4 Gy. RT1C esc. : 59.4 Gy. Méta RT2 : 41.4 Gy / 23 fr. Poumon (WLI) : 15 Gy / 10 fr. Cerveau SRT ou 30 Gy / 10 fr. Péritoine : 24 Gy / 16 fr abdomen.',
        volumes:'Primitif : GTVp_pre → CTVp_pre +1 cm. Méta : GTV_meta → CTV_meta +5–10 mm. GTVmeta_post → CTVmeta_post +5 mm si bulky résiduel.',
        chemo:'IVADo × 9 (CT1A) ou IRIVA × 9. Maintenance VnC × 12 → CT2A.',
        efs:'EFS 3 ans : ~27 % · OS 3 ans : ~34 % — Score Oberlin Modifié pour RT2'} },
    { id:'relapse',label:'Rechute CT3',type:'result_relapse',edgeLabel:'Rechute\nHistologique',
      detail:{title:'RECHUTE — CT3',q:'Rechute ou récidive histologiquement vérifiée. Non-réfractaire.',
        timing:'RT locale après ≥ 2 cycles CT3. Regorafenib : arrêt ≥ 14j avant chirurgie majeure.',
        rt_ind:'RT locale si faisable — décision MDT individuelle. VIRT/VIRR compatible avec RT concomitante.',
        doses:'Selon site, disponibilité RT antérieure. Pas de dose protocole définie.',
        volumes:'Selon site — marges habituelles.',
        chemo:'VIRT ou VIRR (Regorafenib) — CT3 randomisation — max 12 cycles.',
        efs:'EFS 1 an : ~30 % · OS 5 ans : < 20 %'} }
  ]
};

// ═══ FLATTEN ═══
const nodes=[], links=[];
function flatten(n,depth,parentId){
  const obj={...n,depth,parentId,children:undefined};
  nodes.push(obj);
  if(n.children){
    n.children.forEach(c=>flatten(c,depth+1,n.id));
    n.children.forEach(c=>links.push({s:n.id,t:c.id,el:c.edgeLabel}));
  }
}
flatten(TREE,0,null);

// ═══ POSITIONS ═══
const POS={
  root:      {x:0,    y:0},
  fn:        {x:-650, y:100},
  fp:        {x:620,  y:100},
  sgH:       {x:1250, y:100},
  relapse:   {x:1900, y:100},
  fn_i:      {x:-1000,y:210},
  fn_ii:     {x:-350, y:210},
  sgA:       {x:-1160,y:340},
  sgB:       {x:-840, y:340},
  fn_n0:     {x:-530, y:340},
  sgE:       {x:-90,  y:340},
  sgC:       {x:-640, y:470},
  sgD:       {x:-380, y:470},
  sgF:       {x:500,  y:210},
  sgG:       {x:740,  y:210},
};
nodes.forEach(n=>{const p=POS[n.id];if(p){n.x=p.x;n.y=p.y;}else{n.x=0;n.y=0;}});

// ═══ SVG ═══
const W=document.getElementById('chart').clientWidth;
const H=document.getElementById('chart').clientHeight;
const svg=d3.select('#chart').append('svg').attr('width','100%').attr('height','100%');
const defs=svg.append('defs');
Object.entries(NS).forEach(([t,s])=>{
  defs.append('marker').attr('id','arr-'+t).attr('markerWidth',8).attr('markerHeight',8)
    .attr('refX',6).attr('refY',3).attr('orient','auto')
    .append('path').attr('d','M0,0 L0,6 L8,3 z').attr('fill',s.stroke).attr('opacity',0.5);
});
const g=svg.append('g');
const zoom=d3.zoom().scaleExtent([0.1,3]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);

const xs=nodes.map(n=>n.x),ys=nodes.map(n=>n.y);
const minX=Math.min(...xs)-NW,maxX=Math.max(...xs)+NW,minY=Math.min(...ys)-NH,maxY=Math.max(...ys)+NH;
const tw=maxX-minX,th=maxY-minY;
const scale=Math.min(0.88,(W*0.92)/tw,(H*0.88)/th);
const tx=W/2-scale*(minX+tw/2),ty=H/2-scale*(minY+th/2);
svg.call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(scale));
document.getElementById('btnReset').addEventListener('click',()=>svg.transition().duration(600).call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(scale)));

// ═══ LINKS ═══
const nById=Object.fromEntries(nodes.map(n=>[n.id,n]));
links.forEach(l=>{
  const s=nById[l.s],t=nById[l.t];if(!s||!t)return;
  const style=NS[t.type]||NS.decision;
  const y1=s.y+NH/2,y2=t.y-NH/2,my=(y1+y2)/2;
  g.append('path').attr('d',`M${s.x},${y1} C${s.x},${my} ${t.x},${my} ${t.x},${y2}`)
    .attr('fill','none').attr('stroke',style.stroke).attr('stroke-opacity',0.4).attr('stroke-width',1.5)
    .attr('marker-end',`url(#arr-${t.type})`);
  if(l.el){
    const mx=(s.x+t.x)/2,mmy=(y1+y2)/2;
    const bg=g.append('rect').attr('rx',3);
    const txt=g.append('text').attr('x',mx).attr('y',mmy).attr('text-anchor','middle').attr('dominant-baseline','middle')
      .style('font-family','DM Mono,monospace').style('font-size','8px').style('fill',style.stroke);
    l.el.split('\n').forEach((line,i,a)=>{txt.append('tspan').attr('x',mx).attr('dy',i===0?`${-(a.length-1)*6}px`:'11px').text(line);});
    const bb=txt.node().getBBox();
    bg.attr('x',bb.x-3).attr('y',bb.y-2).attr('width',bb.width+6).attr('height',bb.height+4).attr('fill','rgba(245,240,232,0.9)');
    txt.raise();
  }
});

// ═══ NODES ═══
nodes.forEach(n=>{
  g.append('rect').attr('x',n.x-NW/2+2).attr('y',n.y-NH/2+2).attr('width',NW).attr('height',NH)
    .attr('rx',n.type.startsWith('result')?8:4).attr('fill','rgba(0,0,0,0.07)');
});
const ng=g.selectAll('.nd').data(nodes).enter().append('g').attr('class','nd')
  .attr('transform',n=>`translate(${n.x},${n.y})`).style('cursor','default');
ng.append('rect').attr('x',-NW/2).attr('y',-NH/2).attr('width',NW).attr('height',NH)
  .attr('rx',d=>d.type.startsWith('result')?8:4)
  .attr('fill',d=>NS[d.type]?.fill||'#fff').attr('stroke',d=>NS[d.type]?.stroke||'#888').attr('stroke-width',1.5);
ng.append('rect').attr('x',-NW/2).attr('y',-NH/2).attr('width',NW).attr('height',3)
  .attr('rx',d=>d.type.startsWith('result')?8:4).attr('fill',d=>NS[d.type]?.stroke||'#888').attr('opacity',0.7);
const BDGE={result_lr:'LR',result_sr:'SR',result_hr:'HR',result_vhr:'VHR',result_relapse:'CT3'};
ng.filter(d=>d.type.startsWith('result')).append('text')
  .attr('x',NW/2-14).attr('y',-NH/2+11).attr('text-anchor','middle')
  .style('font-family','DM Mono,monospace').style('font-size','7px').style('font-weight','500')
  .attr('fill',d=>NS[d.type]?.stroke||'#888').text(d=>BDGE[d.type]||'');
ng.each(function(d){
  const el=d3.select(this),style=NS[d.type];
  const lines=d.label.split('\n'),by=lines.length===1?0:-(lines.length-1)*6;
  lines.forEach((line,i)=>{
    el.append('text').attr('x',0).attr('y',by+i*13).attr('text-anchor','middle').attr('dominant-baseline','middle')
      .style('font-family',i===0?'DM Sans,sans-serif':'DM Mono,monospace')
      .style('font-size',i===0?'11px':'9px').style('font-weight',i===0?'500':'400')
      .attr('fill',style?.text||'#000').text(line);
  });
});

// ═══ HOVER ═══
ng.on('mouseenter',function(ev,d){
  d3.select(this).select('rect').attr('stroke-width',2.5).attr('filter','brightness(1.1)');
  showTT(ev,d);
}).on('mousemove',function(ev){moveTT(ev);}).on('mouseleave',function(){
  d3.select(this).select('rect').attr('stroke-width',1.5).attr('filter',null);
  document.getElementById('tooltip').style.display='none';
});

// ═══ TOOLTIP ═══
const tt=document.getElementById('tooltip');
function showTT(ev,d){
  const det=d.detail||{};
  document.getElementById('tt-title').textContent=det.title||d.id;
  document.getElementById('tt-q').textContent=det.q||d.label.replace('\n',' — ');
  let h='';
  if(det.timing) h+=section('Timing',det.timing);
  if(det.rt_ind) h+=section('Indication RT',det.rt_ind);
  if(det.doses) h+=doseSection(det.doses);
  if(det.volumes) h+=section('Volumes',det.volumes);
  if(det.chemo) h+=section('Chimiothérapie',det.chemo);
  if(det.efs){
    const cls=d.type==='result_lr'?'efs-good':d.type==='result_vhr'||d.type==='result_relapse'?'efs-bad':'efs-mid';
    h+=`<div class="tt-section"><span class="tt-efs ${cls}">${det.efs}</span></div>`;
  }
  document.getElementById('tt-body').innerHTML=h;
  tt.style.display='block';
  moveTT(ev);
}
function section(lbl,val){return `<div class="tt-section"><div class="tt-section-lbl">${lbl}</div><div class="tt-val" style="font-size:11px;color:#c9d1d9;line-height:1.5">${val}</div></div>`;}
function doseSection(doses){
  // Color-code by dose magnitude
  const parts=doses.split('.');
  let h=`<div class="tt-section"><div class="tt-section-lbl">Doses RT</div>`;
  const re41=/41\.4\s*Gy/g, re50=/50\.4\s*Gy/g, re59=/59\.4\s*Gy/g, re15=/15\s*Gy/g, re30=/30\s*Gy/g;
  let txt=doses.replace(re59,'<span class="tt-dose highesc">59.4 Gy</span>').replace(re50,'<span class="tt-dose esc">50.4 Gy</span>').replace(re41,'<span class="tt-dose" style="color:#388bfd">41.4 Gy</span>').replace(re30,'<span class="tt-dose">30 Gy</span>').replace(re15,'<span class="tt-dose">15 Gy</span>');
  h+=`<div style="font-size:11px;color:#c9d1d9;line-height:1.6">${txt}</div></div>`;
  return h;
}
function moveTT(ev){
  let x=ev.clientX+14,y=ev.clientY+14;
  if(x+330>window.innerWidth-10)x=ev.clientX-334;
  if(y+tt.offsetHeight>window.innerHeight-10)y=ev.clientY-tt.offsetHeight-14;
  tt.style.left=x+'px';tt.style.top=y+'px';
}
</script>
