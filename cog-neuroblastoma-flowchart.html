<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>COG · Neuroblastome — Logigramme de stratification</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── VARIABLES (MODE PARCHEMIN) ── */
:root{
  --bg:#f5f0e8;--surface:#ede8dc;--surface2:#e6e0d2;--surface3:#ddd7c8;
  --border:#c8bfaa;--border2:#d4ccba;
  --text:#1a1208;--text2:#5a4f3a;--text3:#9a8f7a;
  --lr:#2d7a3a;--sr:#1a5fa8;--hr:#c0392b;--special:#a0720a;
  --purple:#6b3fa0;--orange:#c45a10;--cyan:#1a7a8a;
  --radius:10px;
}

/* ── BODY ── */
body{
  font-family:'DM Sans',sans-serif;font-weight:300;
  background:var(--bg);color:var(--text);
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
}

/* ── HEADER ── */
header{
  flex-shrink:0;z-index:10;
  background:rgba(245,240,232,0.97);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:10px 20px;
  display:flex;align-items:center;gap:12px;
}
.hdr-mark{
  width:34px;height:34px;border-radius:6px;
  border:1.5px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  color:var(--cyan);flex-shrink:0;
}
.hdr-content{display:flex;flex-direction:column;gap:1px;min-width:0}
.hdr-title{font-family:'DM Serif Display',serif;font-size:16px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap}
.hdr-badge{
  font-family:'DM Mono',monospace;font-size:9px;
  padding:2px 8px;border-radius:20px;
  background:rgba(26,122,138,0.1);border:1px solid rgba(26,122,138,0.35);
  color:var(--cyan);margin-left:auto;white-space:nowrap;flex-shrink:0;
}
.btn-reset-zoom{
  font-family:'DM Mono',monospace;font-size:10px;
  background:transparent;border:1px solid var(--border2);border-radius:6px;
  color:var(--text2);padding:5px 10px;cursor:pointer;transition:all 0.18s;
  flex-shrink:0;margin-left:8px;
}
.btn-reset-zoom:hover{border-color:var(--cyan);color:var(--cyan)}

/* ── LEGEND ── */
.legend{
  flex-shrink:0;display:flex;align-items:center;gap:16px;
  padding:6px 20px;border-bottom:1px solid var(--border);
  overflow-x:auto;white-space:nowrap;background:var(--bg);
}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}
.legend-swatch{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.legend-swatch.circle{border-radius:50%}
.legend-help{margin-left:auto;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);font-style:italic}

/* ── CHART ── */
#chart{flex:1;overflow:hidden;cursor:grab}
#chart:active{cursor:grabbing}

/* ── TOOLTIP ── */
.tooltip{
  position:fixed;pointer-events:none;z-index:100;
  background:rgba(245,240,232,0.97);border:1px solid var(--border);
  border-radius:8px;padding:14px 16px;max-width:360px;min-width:240px;
  box-shadow:0 4px 20px rgba(0,0,0,0.12);
  font-family:'DM Sans',sans-serif;font-size:12px;
  opacity:0;transition:opacity 0.15s;
}
.tooltip.visible{opacity:1}
.tt-title{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.tt-q{font-weight:500;font-size:13px;margin-bottom:10px;color:var(--text)}
.tt-row{display:flex;gap:8px;margin-bottom:4px;font-size:11px;line-height:1.5}
.tt-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);min-width:70px;flex-shrink:0}
.tt-val{color:var(--text2)}
.tt-outcome{font-family:'DM Mono',monospace;font-size:10px;margin-top:8px;padding-top:6px;border-top:1px solid var(--border)}

/* ── PRINT ── */
@media print{body{background:#fff!important}header{background:#fff!important}.legend{background:#fff!important}}
</style>
</head>
<body>

<header>
  <div class="hdr-mark">NB</div>
  <div class="hdr-content">
    <div class="hdr-title">Neuroblastome — Logigramme COG</div>
    <div class="hdr-sub">Arbre décisionnel · PDQ NCI 2025 · Irwin et al. JCO 2021 · Zoom + drag pour naviguer</div>
  </div>
  <span class="hdr-badge">COG · INRGSS 2021</span>
  <button class="btn-reset-zoom" id="btnReset">⊙ Recentrer</button>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch circle" style="background:#dce8f5;border:1.5px solid #1a5fa8"></div>Décision</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#d5edd8;border:1.5px solid #2d7a3a"></div>Bas risque</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#d5e4f5;border:1.5px solid #1a5fa8"></div>Risque intermédiaire</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f5d8d5;border:1.5px solid #c0392b"></div>Haut risque</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#ece0f5;border:1.5px solid #6b3fa0"></div>Âge / Biologie</div>
  <div class="legend-help">Survoler pour les détails</div>
</div>

<div id="chart"></div>
<div class="tooltip" id="tooltip"></div>

<script>
// ═══ DONNÉES — ARBRE DÉCISIONNEL COG ═══
var TREE = {
  id: 'root', label: 'Neuroblastome\nDiagnostic initial', type: 'decision',
  detail: {title:'Point d\'entrée', q:'Classification du risque COG (INRGSS 2021)', protocol:'COG Risk Classification', outcome:'OS 5 ans global (tous stades) : ~85 % [NCCR 2014-2020]'},
  children: [
    {
      id: 'l1', label: 'Stage L1\n(pas d\'IDRF)', type: 'decision', edgeLabel: 'L1',
      detail: {title:'Stage L1', q:'Tumeur localisée sans image-defined risk factors', outcome:'EFS 5 ans : 90 % · OS 5 ans : 98 %'},
      children: [
        {id: 'l1_na', label: 'MYCN\nnon amplifié', type: 'result_lr', edgeLabel: 'MYCN NA',
          detail: {title:'L1 · MYCN NA', q:'Bas risque — tout âge', protocol:'Chirurgie ± observation', chemo:'Réservée si symptômes', outcome:'EFS 5 ans : 93 % · OS : 99 %', ref:'[3] Strother 2012'}},
        {id: 'l1_amp', label: 'MYCN\namplifié', type: 'decision', edgeLabel: 'MYCN AMP',
          detail: {title:'L1 · MYCN amplifié', q:'Résection détermine le risque'},
          children: [
            {id: 'l1_r0', label: 'R0\n(complet)', type: 'result_lr', edgeLabel: 'Résection\ncomplète',
              detail: {title:'L1 AMP R0', q:'Bas risque malgré MYCN', protocol:'Surveillance', outcome:'EFS 5 ans : 70 % · OS : 80 %', ref:'[3] Strother 2012'}},
            {id: 'l1_ri', label: 'Résidu\ntumoral', type: 'result_hr', edgeLabel: 'Résection\nincomplète',
              detail: {title:'L1 AMP résidu', q:'Haut risque', protocol:'Traitement HR multimodal', outcome:'Selon protocole HR', ref:'[1] Irwin 2021'}}
          ]}
      ]
    },
    {
      id: 'l2', label: 'Stage L2\n(IDRF+)', type: 'decision', edgeLabel: 'L2',
      detail: {title:'Stage L2', q:'Tumeur locorégionale avec IDRFs', outcome:'EFS 5 ans : 84 % · OS : 95 %'},
      children: [
        {id: 'l2_amp', label: 'MYCN\namplifié', type: 'result_hr', edgeLabel: 'MYCN AMP',
          detail: {title:'L2 MYCN AMP', q:'Haut risque', protocol:'Traitement HR multimodal', outcome:'Selon protocole HR', ref:'[1] Irwin 2021'}},
        {id: 'l2_na', label: 'MYCN\nnon amplifié', type: 'decision', edgeLabel: 'MYCN NA',
          detail: {title:'L2 MYCN NA', q:'Âge détermine la suite'},
          children: [
            {id: 'l2_young', label: '< 18 mois', type: 'decision', edgeLabel: '< 18 m',
              detail: {title:'L2 NA < 18 m', q:'Biologie tumorale détermine le risque'},
              children: [
                {id: 'l2_y_fav', label: 'Biologie\nfavorable', type: 'result_sr', edgeLabel: 'FH+Hyper\n+pas SCA',
                  detail: {title:'IR — L2 < 18 m fav', q:'Risque intermédiaire', protocol:'2–4 cycles chimio', chemo:'Carboplatin/VP16 alt. Cyclo/Doxo', outcome:'EFS 3 ans : 92 % · OS : 98 %', ref:'[9] Twist 2019'}},
                {id: 'l2_y_unf', label: 'Facteur(s)\ndéfavorable(s)', type: 'result_sr', edgeLabel: 'UH/Dipl/SCA',
                  detail: {title:'IR — L2 < 18 m unfav', q:'Risque intermédiaire', protocol:'4–8 cycles chimio', chemo:'Carbo/VP16 alt. Cyclo/Doxo ± Cyclo/Topo', outcome:'EFS 10 ans : 82 % (global IR)', ref:'[9,10] Twist/Barr'}}
              ]},
            {id: 'l2_old', label: '≥ 18 mois', type: 'decision', edgeLabel: '≥ 18 m',
              detail: {title:'L2 NA ≥ 18 m', q:'Histologie et différenciation déterminent le risque'},
              children: [
                {id: 'l2_o_fh', label: 'FH\ndifférenciant', type: 'result_sr', edgeLabel: 'FH + Diff',
                  detail: {title:'IR — L2 ≥ 18 m FH diff', q:'Risque intermédiaire', protocol:'4 cycles chimio', outcome:'EFS 3 ans : 92 % · OS : 98 %', ref:'[9] Twist 2019'}},
                {id: 'l2_o_uh', label: 'UH ou\nnon diff.', type: 'result_hr', edgeLabel: 'UH / non diff',
                  detail: {title:'HR — L2 ≥ 18 m UH', q:'Haut risque', protocol:'Traitement HR multimodal', outcome:'Selon protocole HR', ref:'[1] Irwin 2021'}}
              ]}
          ]}
      ]
    },
    {
      id: 'm', label: 'Stage M\n(métastatique)', type: 'decision', edgeLabel: 'M',
      detail: {title:'Stage M', q:'Maladie métastatique à distance', outcome:'EFS 5 ans : 52 % · OS : 64 %'},
      children: [
        {id: 'm_old', label: '≥ 18 mois', type: 'result_hr', edgeLabel: '≥ 18 m',
          detail: {title:'HR — M ≥ 18 m', q:'Haut risque (quel que soit MYCN)', protocol:'Induction → Tandem HSCT → RT → Immuno',
            chemo:'Cisplat/VP16 alt VCR/Cyclo/Doxo (5–6 cy) → Cy/Thio + CEM tandem',
            outcome:'EFS 3 ans tandem+immuno : 73 % · OS : 84 %', ref:'[30] Park 2019'}},
        {id: 'm_baby', label: '< 12 mois', type: 'decision', edgeLabel: '< 12 m',
          detail: {title:'M < 12 m', q:'MYCN puis biologie déterminent le risque'},
          children: [
            {id: 'm_b_amp', label: 'MYCN\namplifié', type: 'result_hr', edgeLabel: 'AMP',
              detail: {title:'HR — M < 12 m AMP', q:'Haut risque', protocol:'Traitement HR', outcome:'EFS 5 ans : 37 % · OS : 45 %', ref:'[1] Irwin 2021'}},
            {id: 'm_b_na', label: 'MYCN NA', type: 'decision', edgeLabel: 'NA',
              detail: {title:'M < 12 m NA', q:'Biologie tumorale détermine le risque'},
              children: [
                {id: 'm_b_fav', label: 'Hyper +\nBio fav', type: 'result_sr', edgeLabel: 'Hyper+FH\n+pas SCA',
                  detail: {title:'IR — M < 12 m fav', q:'Risque intermédiaire', protocol:'4 cycles chimio', outcome:'EFS 10 ans : 86.9 % · OS : 95 %', ref:'[10] Barr 2024'}},
                {id: 'm_b_unf', label: 'Dipl. ou\nfacteur(s) ↓', type: 'result_sr', edgeLabel: 'Dipl/UH/SCA',
                  detail: {title:'IR — M < 12 m unfav', q:'Risque intermédiaire', protocol:'8 cycles chimio', outcome:'EFS 10 ans : 66.8 % · OS : 84.4 %', ref:'[10] Barr 2024'}}
              ]}
          ]},
        {id: 'm_todd', label: '12–18 mois', type: 'decision', edgeLabel: '12–18 m',
          detail: {title:'M 12–18 m', q:'MYCN puis biologie'},
          children: [
            {id: 'm_t_amp', label: 'MYCN\namplifié', type: 'result_hr', edgeLabel: 'AMP',
              detail: {title:'HR — M 12–18 m AMP', q:'Haut risque', protocol:'Traitement HR', outcome:'EFS 5 ans : 53 % · OS : 54 %', ref:'[1] Irwin 2021'}},
            {id: 'm_t_na', label: 'MYCN NA', type: 'decision', edgeLabel: 'NA',
              detail: {title:'M 12–18 m NA', q:'Biologie'},
              children: [
                {id: 'm_t_fav', label: 'Tous\nfavorables', type: 'result_sr', edgeLabel: 'FH+Hyper\n+pas SCA',
                  detail: {title:'IR — M 12–18 m fav', q:'Risque intermédiaire', protocol:'4–8 cycles chimio (adapté réponse)', outcome:'EFS : 62.5 % · OS : 100 %', ref:'[9] Twist 2019'}},
                {id: 'm_t_unf', label: '≥ 1 facteur\ndéfavorable', type: 'result_hr', edgeLabel: 'UH/Dipl/SCA',
                  detail: {title:'HR — M 12–18 m unfav', q:'Haut risque', protocol:'Traitement HR multimodal', outcome:'Selon protocole HR', ref:'[1] Irwin 2021'}}
              ]}
          ]}
      ]
    },
    {
      id: 'ms', label: 'Stage MS\n(< 18 m, méta limitées)', type: 'decision', edgeLabel: 'MS',
      detail: {title:'Stage MS', q:'< 18 mois, métastases peau/foie/moelle', outcome:'EFS 5 ans : 86 % · OS : 92 %'},
      children: [
        {id: 'ms_amp', label: 'MYCN\namplifié', type: 'result_hr', edgeLabel: 'AMP',
          detail: {title:'HR — MS AMP', q:'Haut risque', protocol:'Traitement HR', outcome:'EFS 5 ans : 60 % · OS : 64 %', ref:'[1] Irwin 2021'}},
        {id: 'ms_na', label: 'MYCN NA', type: 'decision', edgeLabel: 'NA',
          detail: {title:'MS NA', q:'Âge et biologie'},
          children: [
            {id: 'ms_young', label: '< 12 mois', type: 'decision', edgeLabel: '< 12 m',
              detail: {title:'MS NA < 12 m', q:'Symptômes et biologie'},
              children: [
                {id: 'ms_y_fav', label: 'Asympt.\nBio fav', type: 'result_lr', edgeLabel: 'Asympt+FH\n+Hyper+∅SCA',
                  detail: {title:'LR — MS asympt fav', q:'Bas risque', protocol:'Observation + soins de support', outcome:'EFS : 86 % · OS : 92 %', ref:'[1] Irwin 2021'}},
                {id: 'ms_y_unf', label: 'Sympt. ou\nbio défav.', type: 'result_sr', edgeLabel: 'Sympt/UH\n/Dipl/SCA',
                  detail: {title:'IR — MS sympt/unfav', q:'Risque intermédiaire', protocol:'2–8 cycles chimio selon symptômes', chemo:'Carbo/VP16 ou Cyclo/Doxo/VCR', outcome:'OS 3 ans : 81.4 %', ref:'[9] Twist 2019'}}
              ]},
            {id: 'ms_todd', label: '12–18 mois', type: 'decision', edgeLabel: '12–18 m',
              detail: {title:'MS NA 12–18 m', q:'Biologie'},
              children: [
                {id: 'ms_t_fav', label: 'FH+Hyper\n∅SCA', type: 'result_sr', edgeLabel: 'Bio fav',
                  detail: {title:'IR — MS 12–18 m fav', q:'Risque intermédiaire', protocol:'Chimio adaptée réponse', outcome:'EFS : 86 % · OS : 92 %', ref:'[1,2]'}},
                {id: 'ms_t_unf', label: 'UH/Dipl\n/SCA', type: 'result_hr', edgeLabel: 'Bio défav',
                  detail: {title:'HR — MS 12–18 m unfav', q:'Haut risque', protocol:'Traitement HR multimodal', outcome:'Selon protocole HR', ref:'[1] Irwin 2021'}}
              ]}
          ]}
      ]
    }
  ]
};

// ═══ NODE STYLES ═══
var NODE_STYLE = {
  decision:       {fill:'#dce8f5', stroke:'#1a5fa8', text:'#0a1020'},
  form:           {fill:'#ece0f5', stroke:'#6b3fa0', text:'#0a1020'},
  result_lr:      {fill:'#d5edd8', stroke:'#2d7a3a', text:'#0a1a0a'},
  result_sr:      {fill:'#d5e4f5', stroke:'#1a5fa8', text:'#0a1020'},
  result_hr:      {fill:'#f5d8d5', stroke:'#c0392b', text:'#200505'},
  result_special: {fill:'#f5ead5', stroke:'#a0720a', text:'#201000'}
};

var RISK_LABELS = {result_lr:'LR', result_sr:'IR', result_hr:'HR', result_special:'?'};

// ═══ DIMENSIONS ═══
var NODE_W = 110, NODE_H = 42, RESULT_W = 120;
var DX = 150, DY = 70;

// ═══ FLATTEN TREE ═══
function flattenTree(node, depth, sibIdx, parent) {
  node._depth = depth;
  node._sibIdx = sibIdx;
  node._parent = parent;
  var nodes = [node];
  if (node.children) {
    for (var i = 0; i < node.children.length; i++) {
      nodes = nodes.concat(flattenTree(node.children[i], depth + 1, i, node));
    }
  }
  return nodes;
}

// ═══ D3 LAYOUT ═══
var chartEl = document.getElementById('chart');
var W = chartEl.clientWidth, H = chartEl.clientHeight;

var svg = d3.select('#chart').append('svg')
  .attr('width', W).attr('height', H);

var g = svg.append('g');

// Build hierarchy
var root = d3.hierarchy(TREE);
var treeLayout = d3.tree()
  .nodeSize([DY, DX])
  .separation(function(a,b){ return a.parent === b.parent ? 1.1 : 1.5; });

treeLayout(root);

// Swap x/y for horizontal layout
root.each(function(d){ var tmp = d.x; d.x = d.y; d.y = tmp; });

// Draw links
var linkGen = d3.linkHorizontal().x(function(d){return d.x}).y(function(d){return d.y});

g.selectAll('.link').data(root.links()).enter()
  .append('path').attr('class','link')
  .attr('d', function(d){ return linkGen({source:{x:d.source.x, y:d.source.y}, target:{x:d.target.x, y:d.target.y}}); })
  .attr('fill','none')
  .attr('stroke', function(d){ var s = NODE_STYLE[d.target.data.type] || NODE_STYLE.decision; return s.stroke; })
  .attr('stroke-width', 1.5)
  .attr('stroke-opacity', 0.35);

// Edge labels
g.selectAll('.edge-label').data(root.links().filter(function(d){return d.target.data.edgeLabel})).enter()
  .append('text').attr('class','edge-label')
  .attr('x', function(d){ return (d.source.x + d.target.x) / 2; })
  .attr('y', function(d){ return (d.source.y + d.target.y) / 2 - 4; })
  .attr('text-anchor','middle')
  .attr('font-family','DM Mono, monospace').attr('font-size','8px').attr('fill','#5a4f3a')
  .each(function(d){
    var lines = d.target.data.edgeLabel.split('\n');
    var el = d3.select(this);
    el.text('');
    for (var i = 0; i < lines.length; i++) {
      el.append('tspan').attr('x', (d.source.x + d.target.x) / 2).attr('dy', i === 0 ? 0 : 11).text(lines[i]);
    }
  });

// Edge label backgrounds
g.selectAll('.edge-bg').data(root.links().filter(function(d){return d.target.data.edgeLabel})).enter()
  .insert('rect','.edge-label').attr('class','edge-bg')
  .each(function(d){
    var lines = d.target.data.edgeLabel.split('\n');
    var maxLen = 0;
    for (var i = 0; i < lines.length; i++) { if (lines[i].length > maxLen) maxLen = lines[i].length; }
    var w = maxLen * 5.5 + 10;
    var h = lines.length * 11 + 6;
    d3.select(this)
      .attr('x', (d.source.x + d.target.x) / 2 - w/2)
      .attr('y', (d.source.y + d.target.y) / 2 - h/2 - 4)
      .attr('width', w).attr('height', h)
      .attr('rx', 3).attr('fill','rgba(245,240,232,0.85)');
  });

// Draw nodes
var nodeGroups = g.selectAll('.node').data(root.descendants()).enter()
  .append('g').attr('class','node')
  .attr('transform', function(d){ return 'translate(' + d.x + ',' + d.y + ')'; });

// Shadow
nodeGroups.append('rect')
  .attr('x', function(d){ var w = d.data.type.startsWith('result') ? RESULT_W : NODE_W; return -w/2 + 2; })
  .attr('y', -NODE_H/2 + 2)
  .attr('width', function(d){ return d.data.type.startsWith('result') ? RESULT_W : NODE_W; })
  .attr('height', NODE_H)
  .attr('rx', function(d){ return d.data.type.startsWith('result') ? 8 : 4; })
  .attr('fill','rgba(0,0,0,0.06)');

// Main rect
nodeGroups.append('rect')
  .attr('x', function(d){ var w = d.data.type.startsWith('result') ? RESULT_W : NODE_W; return -w/2; })
  .attr('y', -NODE_H/2)
  .attr('width', function(d){ return d.data.type.startsWith('result') ? RESULT_W : NODE_W; })
  .attr('height', NODE_H)
  .attr('rx', function(d){ return d.data.type.startsWith('result') ? 8 : 4; })
  .attr('fill', function(d){ return (NODE_STYLE[d.data.type] || NODE_STYLE.decision).fill; })
  .attr('stroke', function(d){ return (NODE_STYLE[d.data.type] || NODE_STYLE.decision).stroke; })
  .attr('stroke-width', 1.5);

// Top accent bar for decision nodes
nodeGroups.filter(function(d){return d.data.type === 'decision'}).append('rect')
  .attr('x', function(d){ return -NODE_W/2; })
  .attr('y', -NODE_H/2)
  .attr('width', NODE_W).attr('height', 3)
  .attr('rx', 2)
  .attr('fill', function(d){ return NODE_STYLE.decision.stroke; });

// Risk badge for result nodes
nodeGroups.filter(function(d){return d.data.type.startsWith('result')}).append('text')
  .attr('x', function(){ return RESULT_W/2 - 6; })
  .attr('y', -NODE_H/2 + 12)
  .attr('text-anchor','end')
  .attr('font-family','DM Mono, monospace').attr('font-size','8px').attr('font-weight','500')
  .attr('fill', function(d){ return (NODE_STYLE[d.data.type] || NODE_STYLE.decision).stroke; })
  .text(function(d){ return RISK_LABELS[d.data.type] || ''; });

// Node text
nodeGroups.each(function(d){
  var el = d3.select(this);
  var lines = d.data.label.split('\n');
  var fontSize = d.data.type.startsWith('result') ? 9 : 10;
  var fontFam = d.data.type.startsWith('result') ? 'DM Mono, monospace' : 'DM Sans, sans-serif';
  var textColor = (NODE_STYLE[d.data.type] || NODE_STYLE.decision).text;
  var startY = -(lines.length - 1) * (fontSize * 1.2) / 2;

  for (var i = 0; i < lines.length; i++) {
    el.append('text')
      .attr('x', 0).attr('y', startY + i * (fontSize * 1.2) + 1)
      .attr('text-anchor','middle').attr('dominant-baseline','central')
      .attr('font-family', fontFam).attr('font-size', fontSize + 'px')
      .attr('font-weight', i === 0 ? '500' : '400')
      .attr('fill', textColor)
      .text(lines[i]);
  }
});

// ═══ TOOLTIP ═══
var tooltipEl = document.getElementById('tooltip');

nodeGroups.on('mouseenter', function(ev, d){
  var det = d.data.detail;
  if (!det) return;
  var html = '<div class="tt-title">' + (det.title || '') + '</div>';
  html += '<div class="tt-q">' + (det.q || '') + '</div>';
  if (det.protocol) html += '<div class="tt-row"><span class="tt-label">Protocole</span><span class="tt-val">' + det.protocol + '</span></div>';
  if (det.chemo) html += '<div class="tt-row"><span class="tt-label">Chimio</span><span class="tt-val">' + det.chemo + '</span></div>';
  if (det.outcome) html += '<div class="tt-outcome">' + det.outcome + '</div>';
  if (det.ref) html += '<div style="font-size:9px;color:#9a8f7a;margin-top:4px">' + det.ref + '</div>';
  tooltipEl.innerHTML = html;
  tooltipEl.classList.add('visible');
  d3.select(this).selectAll('rect').filter(function(dd,i){return i===1}).attr('stroke-width',2.5).attr('filter','brightness(1.1)');
}).on('mousemove', function(ev){
  var x = ev.clientX + 16, y = ev.clientY - 10;
  if (x + 370 > window.innerWidth) x = ev.clientX - 370;
  if (y + 200 > window.innerHeight) y = ev.clientY - 200;
  tooltipEl.style.left = x + 'px';
  tooltipEl.style.top = y + 'px';
}).on('mouseleave', function(){
  tooltipEl.classList.remove('visible');
  d3.select(this).selectAll('rect').filter(function(dd,i){return i===1}).attr('stroke-width',1.5).attr('filter','none');
});

// ═══ ZOOM ═══
var zoom = d3.zoom().scaleExtent([0.15, 3]).on('zoom', function(e){ g.attr('transform', e.transform); });
svg.call(zoom);

// Auto-fit
var bounds = g.node().getBBox();
var scale = Math.min(0.85, W / (bounds.width + 80), H / (bounds.height + 80)) * 0.88;
var tx = W/2 - (bounds.x + bounds.width/2) * scale;
var ty = H/2 - (bounds.y + bounds.height/2) * scale;
var initTransform = d3.zoomIdentity.translate(tx, ty).scale(scale);
svg.call(zoom.transform, initTransform);

document.getElementById('btnReset').addEventListener('click', function(){
  svg.transition().duration(500).call(zoom.transform, initTransform);
});

// Resize
window.addEventListener('resize', function(){
  W = chartEl.clientWidth; H = chartEl.clientHeight;
  svg.attr('width', W).attr('height', H);
});
</script>
</body>
